<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <link rel="stylesheet" href="CSS/FormularioIntegrador.css">
    <link rel="icon" href="Resourse/IMG/LOGOS/BearFitnesslog.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="container-logo">
            <img src="Resourse/IMG/LOGOS/BearFitnesslog.png" alt="Logo de Bear Fitness" class="logo-Img">
        </div>

        <h2>Formulario de productos</h2>

        <form action="" method="get" class="form-container" id="form-product">
            <div class="form-group">
                <label for="nombre">Nombre del producto:</label>
                <input type="text" id="nombre" placeholder="Ingrese el nombre del producto" required minlength="3"
                    maxlength="20">
            </div>

            <div class="form-group">
                <label for="precio">Precio del producto:</label>
                <input type="number" id="precio" placeholder="Ingrese el precio del producto (COP)" required min="1"
                    max="100000000">
            </div>

            <div class="form-group">
                <label for="marca">Marca/Creador</label>
                <input type="text" id="marca-creador" placeholder="Ingrese la marca del producto" required minlength="1"
                    maxlength="30">
            </div>

            <div class="form-group">
                <label for="categoria">Categoría</label>
                <select id="categoria" required>
                    <option value="">Seleccione una categoría</option>
                    <option value="Suplementos">Suplementos</option>
                    <option value="Maquinas">Máquinas</option>
                    <option value="Rutinas">Rutinas</option>
                    <option value="otros">Otros</option>
                </select>
            </div>

            <div class="form-group full-width">
                <label for="descripcion">Descripción del producto:</label>
                <textarea id="descripcion" placeholder="Ingrese una descripción del producto" required minlength="10"
                    maxlength="500"></textarea>
            </div>

            <div class="form-group">
                <label for="imagen">Imagen del producto:</label>
                <input type="file" id="imagen" accept="image/*" required>
                <img class="preview-img" id="preview-img" alt="Vista previa de la imagen">
            </div>

            <div class="button-container">
                <button id="btnAgregar" type="submit">Registrar producto</button>
            </div>
        </form>
    </div>
    <script src="JS/FormularioIntegrador.js"></script>
</body>

</html>
